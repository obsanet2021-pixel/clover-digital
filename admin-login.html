<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CLOVER DIGITAL</title>
    <meta name="description" content="Admin Portal - Secure Access Only">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS files -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-login-page">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-header">
                <img src="assets/images/logo/clover%20p1.png" alt="Clover Digital" class="login-logo">
                <h1>CLOVER DIGITAL</h1>
                <p>Admin Portal</p>
            </div>

            <!-- Login Form -->
            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label for="adminEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="adminEmail" 
                        name="email" 
                        required 
                        placeholder="admin@cloverdigital.com"
                    >
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="adminPassword" 
                            name="password" 
                            required 
                            placeholder="Enter your password"
                        >
                        <button type="button" class="toggle-password-btn" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Keep me logged in</label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <span>Login to Admin</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <!-- Security Info -->
            <div class="security-info">
                <p><i class="fas fa-lock"></i> This portal is for authorized administrators only.</p>
                <p>Unauthorized access attempts are logged and monitored.</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>&copy; 2026 CLOVER DIGITAL. All rights reserved.</p>
            <p><a href="index.html">← Back to Website</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/admin-auth.js"></script>
    <script>
        // Handle login form submission
        const loginForm = document.getElementById('adminLoginForm');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('adminPassword');
        const errorMessage = document.getElementById('errorMessage');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePasswordBtn.querySelector('i').classList.toggle('fa-eye');
            togglePasswordBtn.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Validate credentials using admin-auth.js
            if (AdminAuth.validateCredentials(email, password)) {
                AdminAuth.setSession(email, rememberMe);
                errorMessage.style.display = 'none';
                
                // Redirect to admin dashboard
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 500);
            } else {
                errorMessage.textContent = '❌ Invalid email or password. Please try again.';
                errorMessage.style.display = 'block';
                passwordInput.value = '';
            }
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            if (AdminAuth.isLoggedIn()) {
                window.location.href = 'admin-dashboard.html';
            }
        });
    </script>
</body>
</html>
